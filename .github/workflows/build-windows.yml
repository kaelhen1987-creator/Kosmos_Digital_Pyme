name: Build Windows Executable

on:
  workflow_dispatch:

jobs:
  windows_exe:
    name: Build Windows Executable
    runs-on: windows-latest
    env:
      PYTHONUTF8: 1
      PYTHONIOENCODING: utf-8
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install flet
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Convert Icon to ICO format
        run: |
          pip install Pillow
          python -c "from PIL import Image; img = Image.open('assets/icon.png'); img.save('assets/icon.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])"
          Copy-Item assets/icon.ico assets/icon_original.ico
          Remove-Item assets/icon.png
          Move-Item assets/icon.ico assets/icon.png

      - name: Flet Build Windows
        run: |
          chcp 65001
          flet build windows --verbose --yes --project sosdigitalpyme --no-rich-output --skip-flutter-doctor

      - name: Debug - List build output
        run: |
          Write-Host "=== Listing build directory structure ==="
          if (Test-Path build) {
            Get-ChildItem -Path build -Recurse -Depth 5 | Select-Object FullName
          } else {
            Write-Host "build directory not found"
          }
          Write-Host "=== Searching for .exe files ==="
          Get-ChildItem -Path . -Filter *.exe -Recurse -ErrorAction SilentlyContinue | Select-Object FullName

      - name: Install Inno Setup
        run: |
          choco install innosetup --yes

      - name: Compile Windows Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload Windows Installer as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-installer-v0.11.24
          path: Output/*.exe
          retention-days: 30